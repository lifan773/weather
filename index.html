<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Dashboard</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(160deg, #e8f0fe 0%, #d4e4fc 40%, #f0f4ff 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 640px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a3a6b;
      letter-spacing: -0.3px;
    }

    .lang-toggle {
      padding: 6px 14px;
      border: 2px solid #2563eb;
      border-radius: 20px;
      background: #fff;
      color: #2563eb;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .lang-toggle:hover {
      background: #2563eb;
      color: #fff;
    }

    /* Search */
    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 32px;
      background: #fff;
      border-radius: 14px;
      padding: 6px;
      box-shadow: 0 2px 12px rgba(30, 60, 120, 0.10);
    }

    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      padding: 14px 16px;
      font-size: 16px;
      color: #1a3a6b;
      background: transparent;
      border-radius: 10px;
    }

    .search-bar input::placeholder {
      color: #a0b4d0;
    }

    .search-bar button {
      padding: 14px 28px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .search-bar button:hover {
      background: #1d4ed8;
    }

    /* Error */
    .error {
      text-align: center;
      color: #dc2626;
      margin-bottom: 20px;
      font-size: 14px;
      min-height: 20px;
    }

    /* Current weather card */
    .current-card {
      background: #fff;
      border-radius: 18px;
      padding: 32px;
      margin-bottom: 24px;
      box-shadow: 0 4px 24px rgba(30, 60, 120, 0.08);
      display: none;
    }

    .current-card.visible {
      display: block;
    }

    .current-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .city-name {
      font-size: 22px;
      font-weight: 700;
      color: #1a3a6b;
    }

    .weather-icon-large {
      width: 80px;
      height: 80px;
    }

    .current-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .detail-block {
      background: #f0f5ff;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .detail-label {
      font-size: 13px;
      color: #6b8ab5;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .detail-value {
      font-size: 36px;
      font-weight: 700;
      color: #1a3a6b;
    }

    .detail-value.small {
      font-size: 30px;
    }

    .detail-unit {
      font-size: 16px;
      font-weight: 400;
      color: #6b8ab5;
    }

    .condition-text {
      font-size: 15px;
      color: #4a6d9e;
      margin-top: 4px;
      text-transform: capitalize;
    }

    /* Forecast */
    .forecast-section {
      display: none;
    }

    .forecast-section.visible {
      display: block;
    }

    .forecast-title {
      font-size: 18px;
      font-weight: 700;
      color: #1a3a6b;
      margin-bottom: 16px;
      padding-left: 4px;
    }

    .forecast-list {
      display: flex;
      gap: 12px;
    }

    .forecast-card {
      flex: 1;
      background: #fff;
      border-radius: 14px;
      padding: 18px 10px;
      text-align: center;
      box-shadow: 0 2px 16px rgba(30, 60, 120, 0.06);
    }

    .forecast-day {
      font-size: 14px;
      font-weight: 600;
      color: #1a3a6b;
      margin-bottom: 8px;
    }

    .forecast-icon {
      width: 44px;
      height: 44px;
      margin: 0 auto 8px;
    }

    .forecast-high {
      font-size: 16px;
      font-weight: 700;
      color: #1a3a6b;
    }

    .forecast-low {
      font-size: 14px;
      color: #8aa4c4;
      margin-top: 2px;
    }

    /* State: empty / welcome */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: #6b8ab5;
      font-size: 15px;
      line-height: 1.6;
    }

    .empty-state svg {
      display: block;
      margin: 0 auto 16px;
      opacity: 0.5;
    }

    /* API key hint */
    .api-key-hint {
      text-align: center;
      margin-top: 40px;
      font-size: 12px;
      color: #9db5d6;
    }

    .api-key-hint a {
      color: #2563eb;
      text-decoration: none;
    }

    /* Responsive */
    @media (max-width: 560px) {
      .current-details {
        grid-template-columns: 1fr;
      }

      .forecast-list {
        flex-wrap: wrap;
      }

      .forecast-card {
        flex: 1 1 calc(33.33% - 12px);
        min-width: 90px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 data-i18n="title">Weather Dashboard</h1>
      <button class="lang-toggle" id="langToggle">中文</button>
    </div>

    <div class="search-bar">
      <input
        type="text"
        id="cityInput"
        data-i18n-placeholder="placeholder"
        placeholder="Enter a city name..."
        autocomplete="off"
      />
      <button id="searchBtn" data-i18n="searchBtn">Search</button>
    </div>

    <div class="error" id="errorMsg"></div>

    <div id="emptyState" class="empty-state">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#6b8ab5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
      </svg>
      <span data-i18n="emptyState">Search for a city to see the weather</span>
    </div>

    <div class="current-card" id="currentCard">
      <div class="current-top">
        <div>
          <div class="city-name" id="cityName"></div>
          <div class="condition-text" id="conditionText"></div>
        </div>
        <img class="weather-icon-large" id="weatherIconLarge" alt="" />
      </div>
      <div class="current-details">
        <div class="detail-block">
          <div class="detail-label" data-i18n="temperature">Temperature</div>
          <div class="detail-value" id="tempValue">--<span class="detail-unit">&deg;F</span></div>
        </div>
        <div class="detail-block">
          <div class="detail-label" data-i18n="humidity">Humidity</div>
          <div class="detail-value small" id="humidityValue">--<span class="detail-unit">%</span></div>
        </div>
      </div>
    </div>

    <div class="forecast-section" id="forecastSection">
      <div class="forecast-title" data-i18n="forecastTitle">5-Day Forecast</div>
      <div class="forecast-list" id="forecastList"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>

  <div class="api-key-hint">
    <span data-i18n="apiHint">Get a free API key at</span> <a href="https://openweathermap.org/api" target="_blank" rel="noopener">openweathermap.org/api</a>
  </div>
</body>
</html>
